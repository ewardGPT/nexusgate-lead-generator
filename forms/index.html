<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexusGate — Get Early Access</title>
  <meta name="description" content="Join the waitlist for NexusGate — open-source AI Agent & LLM monitoring for engineering teams.">

  <!-- Open Graph -->
  <meta property="og:title" content="NexusGate — LLM Monitoring for Engineering Teams">
  <meta property="og:description" content="Open-source observability for your LLM pipeline. One-line integration.">
  <meta property="og:type" content="website">

  <style>
    /* ============================================================
       CSS Reset & Variables
       ============================================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --color-bg: #0a0a0f;
      --color-surface: #12121a;
      --color-surface-hover: #1a1a26;
      --color-border: #2a2a3a;
      --color-border-focus: #6c5ce7;
      --color-text: #e8e8f0;
      --color-text-muted: #8888a0;
      --color-primary: #6c5ce7;
      --color-primary-hover: #7d6ff0;
      --color-success: #00d68f;
      --color-error: #ff6b6b;
      --color-warning: #ffc048;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.5);
      --transition: 150ms ease;
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
    }

    /* ============================================================
       Base Styles
       ============================================================ */
    body {
      font-family: var(--font-sans);
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(108, 92, 231, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(0, 214, 143, 0.05) 0%, transparent 50%);
    }

    /* ============================================================
       Form Container
       ============================================================ */
    .form-container {
      width: 100%;
      max-width: 520px;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: 2.5rem;
      box-shadow: var(--shadow-lg);
      position: relative;
      overflow: hidden;
    }

    .form-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--color-primary), var(--color-success));
    }

    /* ============================================================
       Header
       ============================================================ */
    .form-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .form-header .logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--color-text);
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }

    .form-header .logo span {
      color: var(--color-primary);
    }

    .form-header h1 {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--color-text);
      margin-bottom: 0.5rem;
    }

    .form-header p {
      font-size: 0.9rem;
      color: var(--color-text-muted);
      line-height: 1.5;
    }

    /* ============================================================
       Progress Indicator
       ============================================================ */
    .progress-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
      font-size: 0.8rem;
      color: var(--color-text-muted);
    }

    .progress-steps {
      display: flex;
      gap: 0.5rem;
    }

    .progress-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--color-border);
      transition: background var(--transition);
    }

    .progress-dot.active {
      background: var(--color-primary);
    }

    .progress-dot.completed {
      background: var(--color-success);
    }

    /* ============================================================
       Form Steps
       ============================================================ */
    .form-step {
      display: none;
      animation: fadeIn 300ms ease;
    }

    .form-step.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ============================================================
       Form Fields
       ============================================================ */
    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--color-text);
      margin-bottom: 0.5rem;
    }

    .form-group label .required {
      color: var(--color-error);
      margin-left: 2px;
    }

    .form-group label .optional {
      color: var(--color-text-muted);
      font-weight: 400;
      font-size: 0.75rem;
      margin-left: 0.25rem;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 0.75rem 1rem;
      font-size: 0.95rem;
      font-family: var(--font-sans);
      color: var(--color-text);
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      transition: border-color var(--transition), box-shadow var(--transition);
      outline: none;
    }

    .form-group input::placeholder,
    .form-group textarea::placeholder {
      color: var(--color-text-muted);
    }

    .form-group input:focus,
    .form-group textarea:focus {
      border-color: var(--color-border-focus);
      box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.15);
    }

    .form-group input.error,
    .form-group textarea.error {
      border-color: var(--color-error);
      box-shadow: 0 0 0 3px rgba(255, 107, 107, 0.1);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 100px;
      line-height: 1.5;
    }

    .form-group .char-count {
      font-size: 0.75rem;
      color: var(--color-text-muted);
      text-align: right;
      margin-top: 0.25rem;
    }

    .form-group .char-count.warning {
      color: var(--color-warning);
    }

    .form-group .char-count.error {
      color: var(--color-error);
    }

    /* Inline validation message */
    .form-group .validation-msg {
      font-size: 0.78rem;
      color: var(--color-error);
      margin-top: 0.35rem;
      display: none;
    }

    .form-group .validation-msg.visible {
      display: block;
    }

    /* ============================================================
       Honeypot (anti-spam)
       ============================================================ */
    .hp-field {
      position: absolute;
      left: -9999px;
      width: 1px;
      height: 1px;
      overflow: hidden;
      opacity: 0;
    }

    /* ============================================================
       Buttons
       ============================================================ */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      padding: 0.85rem 1.5rem;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: var(--font-sans);
      color: #fff;
      background: var(--color-primary);
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: background var(--transition), transform var(--transition);
    }

    .btn:hover {
      background: var(--color-primary-hover);
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }

    .btn.loading .spinner {
      display: block;
    }

    .btn.loading {
      pointer-events: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ============================================================
       Confirmation Message
       ============================================================ */
    .confirmation-message {
      display: none;
      text-align: center;
      padding: 2rem 1rem;
      animation: fadeIn 400ms ease;
    }

    .confirmation-message.visible {
      display: block;
    }

    .confirmation-message .icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .confirmation-message h2 {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--color-success);
      margin-bottom: 0.5rem;
    }

    .confirmation-message p {
      font-size: 0.9rem;
      color: var(--color-text-muted);
      line-height: 1.6;
    }

    .confirmation-message .highlight {
      color: var(--color-text);
      font-weight: 500;
    }

    /* ============================================================
       Error State
       ============================================================ */
    .form-error {
      display: none;
      background: rgba(255, 107, 107, 0.1);
      border: 1px solid var(--color-error);
      border-radius: var(--radius-md);
      padding: 0.75rem 1rem;
      font-size: 0.85rem;
      color: var(--color-error);
      margin-bottom: 1rem;
      text-align: center;
    }

    .form-error.visible {
      display: block;
    }

    /* ============================================================
       Footer
       ============================================================ */
    .form-footer {
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid var(--color-border);
      text-align: center;
      font-size: 0.75rem;
      color: var(--color-text-muted);
    }

    .form-footer a {
      color: var(--color-primary);
      text-decoration: none;
    }

    .form-footer a:hover {
      text-decoration: underline;
    }

    /* ============================================================
       Responsive
       ============================================================ */
    @media (max-width: 480px) {
      .form-container {
        padding: 1.5rem;
      }

      .form-header h1 {
        font-size: 1.1rem;
      }
    }
  </style>
</head>
<body>

  <main class="form-container" role="main">
    <!-- Header -->
    <header class="form-header">
      <div class="logo">Nexus<span>Gate</span></div>
      <h1>LLM Monitoring for Engineering Teams</h1>
      <p>Open-source observability for your AI pipeline. One-line integration.</p>
    </header>

    <!-- Progress Indicator -->
    <div class="progress-bar" id="progressBar">
      <span id="progressText">Step 1 of 2</span>
      <div class="progress-steps">
        <span class="progress-dot active" id="dot1"></span>
        <span class="progress-dot" id="dot2"></span>
      </div>
    </div>

    <!-- Global Error -->
    <div class="form-error" id="formError" role="alert"></div>

    <!-- Form -->
    <form id="leadForm" novalidate>
      <!-- Honeypot fields (hidden from real users, caught by bots) -->
      <div class="hp-field" aria-hidden="true">
        <label for="hp_website">Website</label>
        <input type="text" id="hp_website" name="website" tabindex="-1" autocomplete="off">
      </div>
      <div class="hp-field" aria-hidden="true">
        <label for="hp_phone">Phone</label>
        <input type="text" id="hp_phone" name="phone" tabindex="-1" autocomplete="off">
      </div>
      <input type="text" name="_honeypot" class="hp-field" tabindex="-1" autocomplete="off" aria-hidden="true">

      <!-- ===== STEP 1: Low Friction ===== -->
      <div class="form-step active" id="step1">
        <div class="form-group">
          <label for="email">Work Email <span class="required">*</span></label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@company.com"
            required
            autocomplete="email"
            aria-describedby="emailValidation"
          >
          <div class="validation-msg" id="emailValidation"></div>
        </div>

        <div class="form-group">
          <label for="use_case">What's your biggest challenge with LLM observability? <span class="required">*</span></label>
          <textarea
            id="use_case"
            name="use_case"
            placeholder="e.g., We need to monitor our GPT-4 pipeline in production — track costs, latency, and model drift..."
            required
            maxlength="500"
            aria-describedby="useCaseCount"
          ></textarea>
          <div class="char-count" id="useCaseCount">0 / 500</div>
        </div>

        <button type="button" class="btn" id="nextBtn">
          <span>Next</span>
          <span class="spinner"></span>
        </button>
      </div>

      <!-- ===== STEP 2: Optional Enrichment ===== -->
      <div class="form-step" id="step2">
        <div class="form-group">
          <label for="name">Your Name <span class="optional">(optional)</span></label>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="Jane Doe"
            maxlength="100"
            autocomplete="name"
          >
        </div>

        <div class="form-group">
          <label for="company">Company <span class="optional">(optional)</span></label>
          <input
            type="text"
            id="company"
            name="company"
            placeholder="Acme AI Labs"
            maxlength="150"
            autocomplete="organization"
          >
        </div>

        <div class="form-group">
          <label for="company_domain">Company Website <span class="optional">(optional)</span></label>
          <input
            type="text"
            id="company_domain"
            name="company_domain"
            placeholder="acme-ai.com"
            maxlength="150"
          >
        </div>

        <button type="submit" class="btn" id="submitBtn">
          <span>Submit</span>
          <span class="spinner"></span>
        </button>

        <p style="text-align: center; margin-top: 0.75rem; font-size: 0.8rem; color: var(--color-text-muted);">
          <button type="button" id="skipStep2" style="background: none; border: none; color: var(--color-text-muted); cursor: pointer; text-decoration: underline; font-size: 0.8rem; padding: 0;">
            Skip this step — submit with just my email
          </button>
        </p>
      </div>
    </form>

    <!-- Confirmation Message -->
    <div class="confirmation-message" id="confirmationMessage">
      <div class="icon">🚀</div>
      <h2>You're on the list!</h2>
      <p>Thanks for your interest in <span class="highlight">NexusGate</span>.<br>
      We'll be in touch soon with next steps.</p>
    </div>

    <!-- Footer -->
    <footer class="form-footer" id="formFooter">
      <p>Powered by <a href="https://nexusgate.tech" target="_blank" rel="noopener noreferrer">NexusGate</a> · Open-source LLM monitoring</p>
    </footer>
  </main>

  <!-- Config -->
  <script src="config.js"></script>

  <script>
    /**
     * NexusGate Lead Form — Client-Side Logic
     * 
     * Handles multi-step flow, inline validation, honeypot spam detection,
     * rate limiting, and webhook submission.
     */
    (function () {
      'use strict';

      // ============================================================
      // DOM References
      // ============================================================
      const form = document.getElementById('leadForm');
      const step1 = document.getElementById('step1');
      const step2 = document.getElementById('step2');
      const nextBtn = document.getElementById('nextBtn');
      const submitBtn = document.getElementById('submitBtn');
      const skipStep2 = document.getElementById('skipStep2');
      const progressBar = document.getElementById('progressBar');
      const progressText = document.getElementById('progressText');
      const dot1 = document.getElementById('dot1');
      const dot2 = document.getElementById('dot2');
      const formError = document.getElementById('formError');
      const confirmationMsg = document.getElementById('confirmationMessage');
      const emailInput = document.getElementById('email');
      const emailValidation = document.getElementById('emailValidation');
      const useCaseInput = document.getElementById('use_case');
      const useCaseCount = document.getElementById('useCaseCount');

      // ============================================================
      // Config
      // ============================================================
      const config = window.FORM_CONFIG || {
        webhookUrl: 'https://your-n8n-instance.com/webhook/incoming-lead',
        validation: {
          email: {
            regex: /^[^\s@]+@[^\s@]+\.[^\s@]+$/,
            message: 'Please enter a valid email address'
          },
          useCase: {
            maxLength: 500,
            message: 'Use case must be under 500 characters'
          }
        }
      };

      // Rate limiting state (client-side hint only)
      let lastSubmitTime = 0;

      // ============================================================
      // Utility Functions
      // ============================================================
      function showElement(el) { el.classList.add('visible'); }
      function hideElement(el) { el.classList.remove('visible'); }

      function showError(message) {
        formError.textContent = message;
        showElement(formError);
      }

      function hideError() {
        hideElement(formError);
      }

      function setButtonLoading(btn, loading) {
        if (loading) {
          btn.classList.add('loading');
          btn.disabled = true;
        } else {
          btn.classList.remove('loading');
          btn.disabled = false;
        }
      }

      // ============================================================
      // Validation
      // ============================================================
      function validateEmail() {
        const email = emailInput.value.trim();
        const regex = config.validation.email.regex;

        if (!email) {
          showFieldError(emailInput, emailValidation, 'Email is required');
          return false;
        }

        if (!regex.test(email)) {
          showFieldError(emailInput, emailValidation, config.validation.email.message);
          return false;
        }

        clearFieldError(emailInput, emailValidation);
        return true;
      }

      function validateUseCase() {
        const text = useCaseInput.value.trim();

        if (!text) {
          showFieldError(useCaseInput, null, 'Please describe your use case');
          return false;
        }

        if (text.length > config.validation.useCase.maxLength) {
          showFieldError(useCaseInput, null, config.validation.useCase.message);
          return false;
        }

        clearFieldError(useCaseInput, null);
        return true;
      }

      function showFieldError(input, validationEl, message) {
        input.classList.add('error');
        if (validationEl) {
          validationEl.textContent = message;
          validationEl.classList.add('visible');
        }
      }

      function clearFieldError(input, validationEl) {
        input.classList.remove('error');
        if (validationEl) {
          validationEl.textContent = '';
          validationEl.classList.remove('visible');
        }
      }

      // ============================================================
      // Character Counter
      // ============================================================
      useCaseInput.addEventListener('input', function () {
        const len = useCaseInput.value.length;
        const max = config.validation.useCase.maxLength;
        useCaseCount.textContent = `${len} / ${max}`;

        useCaseCount.classList.remove('warning', 'error');
        if (len > max * 0.9) {
          useCaseCount.classList.add('error');
        } else if (len > max * 0.7) {
          useCaseCount.classList.add('warning');
        }
      });

      // ============================================================
      // Inline Validation on Blur
      // ============================================================
      emailInput.addEventListener('blur', function () {
        if (emailInput.value.trim()) {
          validateEmail();
        }
      });

      emailInput.addEventListener('input', function () {
        if (emailInput.classList.contains('error')) {
          validateEmail();
        }
      });

      // ============================================================
      // Step Navigation
      // ============================================================
      function goToStep(step) {
        step1.classList.remove('active');
        step2.classList.remove('active');

        if (step === 1) {
          step1.classList.add('active');
          progressText.textContent = 'Step 1 of 2';
          dot1.classList.add('active');
          dot1.classList.remove('completed');
          dot2.classList.remove('active', 'completed');
        } else {
          step2.classList.add('active');
          progressText.textContent = 'Step 2 of 2 — Optional';
          dot1.classList.remove('active');
          dot1.classList.add('completed');
          dot2.classList.add('active');
        }

        hideError();
      }

      // ============================================================
      // Next Button (Step 1 → Step 2)
      // ============================================================
      nextBtn.addEventListener('click', function () {
        hideError();

        if (!validateEmail()) {
          emailInput.focus();
          return;
        }

        if (!validateUseCase()) {
          useCaseInput.focus();
          return;
        }

        goToStep(2);
      });

      // ============================================================
      // Skip Step 2
      // ============================================================
      skipStep2.addEventListener('click', function () {
        submitForm(true);
      });

      // ============================================================
      // Form Submission
      // ============================================================
      form.addEventListener('submit', function (e) {
        e.preventDefault();
        submitForm(false);
      });

      async function submitForm(skippedStep2) {
        hideError();

        // Check honeypot
        const honeypot = form.querySelector('[name="_honeypot"]').value;
        const hpWebsite = document.getElementById('hp_website').value;
        const hpPhone = document.getElementById('hp_phone').value;

        if (honeypot || hpWebsite || hpPhone) {
          // Silent rejection for bots
          console.log('Spam detected — submission rejected');
          return;
        }

        // Check rate limiting (client-side hint)
        const now = Date.now();
        if (now - lastSubmitTime < config.rateLimit?.windowMs || 60000) {
          // Client-side rate limit is just a hint; server enforces real limit
        }

        // Build payload
        const payload = {
          email: emailInput.value.trim().toLowerCase(),
          use_case: useCaseInput.value.trim()
        };

        if (!skippedStep2) {
          payload.name = document.getElementById('name').value.trim();
          payload.company = document.getElementById('company').value.trim();
          payload.company_domain = document.getElementById('company_domain').value.trim();
        }

        // Submit
        setButtonLoading(submitBtn, true);

        try {
          const response = await fetch(config.webhookUrl, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              ...(config.webhookSecret ? { 'X-Webhook-Secret': config.webhookSecret } : {})
            },
            body: JSON.stringify(payload)
          });

          if (!response.ok) {
            throw new Error(`Server returned ${response.status}: ${response.statusText}`);
          }

          const data = await response.json().catch(() => ({}));

          // Success
          lastSubmitTime = Date.now();
          showConfirmation();

        } catch (err) {
          console.error('Form submission error:', err);
          showError('Something went wrong. Please try again in a moment.');
        } finally {
          setButtonLoading(submitBtn, false);
        }
      }

      // ============================================================
      // Confirmation
      // ============================================================
      function showConfirmation() {
        form.style.display = 'none';
        progressBar.style.display = 'none';
        confirmationMsg.classList.add('visible');
        document.getElementById('formFooter').style.display = 'none';
      }

      // ============================================================
      // Accessibility: Allow Enter to trigger next/submit
      // ============================================================
      form.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') {
          e.preventDefault();
          if (step1.classList.contains('active')) {
            nextBtn.click();
          } else {
            submitBtn.click();
          }
        }
      });
    })();
  </script>

</body>
</html>
